<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Pro - v10.4 Final Drill-down</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="dashboard-wrapper">
    <div class="main-grid">
        <div class="sidebar">
            <div class="card">
                <div class="portfolio-header">
                    <label>Total Assets (Nominal)</label>
                    <div id="totalPortfolioAmount" class="total-amount">£0</div>
                </div>

                <div class="scenario-box">
                    <label style="color: var(--primary); margin:0;">Scenario Retire Age</label>
                    <input type="number" id="scenarioRetireAge" value="65">
                </div>

                <label>Active Return Scenario</label>
                <div class="risk-selector">
                    <button class="risk-btn" id="btn-cons" onclick="applyScenario('cons', this)">Cons</button>
                    <button class="risk-btn active" id="btn-bal" onclick="applyScenario('bal', this)">Bal</button>
                    <button class="risk-btn" id="btn-aggr" onclick="applyScenario('aggr', this)">Aggr</button>
                </div>

                <label>Display Currency</label>
                <select id="displayCurrency" onchange="changeDisplayCurrency(this.value)" style="margin-bottom: 15px;">
                    <option value="GBP">GBP (£)</option>
                    <option value="USD">USD ($)</option>
                </select>

                <div class="rate-grid">
                    <div><label>Cons %</label><input type="number" id="rate-cons" value="4"></div>
                    <div><label>Bal %</label><input type="number" id="rate-bal" value="6"></div>
                    <div><label>Aggr %</label><input type="number" id="rate-aggr" value="8"></div>
                </div>

                <div class="setup-grid">
                    <div><label>Birth Year</label><input type="number" id="birthYear" value="1970"></div>
                    <div><label>Inflation %</label><input type="number" id="inflationRate" value="2.5" step="0.1"></div>
                    <div><label>Safe Draw %</label><input type="number" id="drawdownRate" value="4"></div>
                    <div style="background: #fff0f0; padding: 5px; border-radius: 8px; border: 1px solid #fad2cf;">
                        <label style="color: #c5221f;">Req /mo (Adjusted)</label>
                        <input type="number" id="realRequirement" value="6000" step="1000">
                    </div>
                </div>

                <button class="btn-calc" onclick="calculate()">Project Life Path</button>
                
                <div id="accountList" style="margin-bottom: 20px;"></div>

                <div style="display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px;">
                    <button class="btn-secondary" onclick="toggleSection('formContent')">+ Acc</button>
                    <button class="btn-secondary" onclick="toggleSection('pensionContent')">+ Pen</button>
                    <button class="btn-secondary" onclick="toggleSection('historyContent')">History</button>
                    <button class="btn-secondary" onclick="toggleSection('syncContent')">Sync</button>
                </div>

                <div id="formContent" class="collapsible-content">
                    <div style="background:#f8f9fa; padding:15px; border-radius:12px;">
                        <input type="hidden" id="editIndex" value="-1">
                        <label>Account Name</label><input type="text" id="accName">
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin: 10px 0;">
                            <div><label>Curr</label><select id="accCurr"><option value="GBP">GBP (£)</option><option value="USD">USD ($)</option><option value="HKD">HKD ($)</option></select></div>
                            <div><label>Balance</label><input type="number" id="accBal"></div>
                        </div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            <div><label>Draw Age</label><input type="number" id="accRetireAge" value="65"></div>
                            <div><label>Monthly Contrib</label><input type="number" id="accMonthly" value="0"></div>
                        </div>
                        <div style="margin: 10px 0;"><label style="display:flex; align-items:center; gap:8px; text-transform:none;"><input type="checkbox" id="accLocked" style="width:auto;"> Lock Age</label></div>
                        <div id="eventsListUI"></div>
                        <button onclick="addEventInputUI()" style="font-size:9px; background:none; border:1px solid #ccc; padding:4px; border-radius:5px; margin-bottom:10px;">+ One-Off Event</button>
                        <button class="btn-calc" style="background:var(--success); margin-top:10px;" onclick="saveAccount()">Save & Sync Progress</button>
                        <button class="btn-secondary" style="width:100%; color:var(--danger);" onclick="confirmRemove()">Remove</button>
                    </div>
                </div>

                <div id="pensionContent" class="collapsible-content">
                    <div style="background:#e6f4ea; padding:15px; border-radius:12px;">
                        <div id="pensionInputList"></div>
                        <button onclick="addPensionUI()" style="font-size:10px; background:white; border:1px solid #34a853; padding:5px; border-radius:5px; color:#34a853; margin-top:10px;">+ Add Pension</button>
                        <button class="btn-calc" style="background:var(--success); margin-top:10px;" onclick="savePensions()">Save Pensions</button>
                    </div>
                </div>

                <div id="historyContent" class="collapsible-content">
                    <div style="background:#fff7e6; padding:15px; border-radius:12px;">
                        <div id="historyInputList"></div>
                        <button onclick="addHistoryUI()" style="font-size:10px; background:white; border:1px solid #fbbc04; padding:5px; border-radius:5px; color:#fbbc04; margin-top:10px;">+ Manual Entry</button>
                        <button class="btn-calc" style="background:#fbbc04; color:white; margin-top:10px;" onclick="saveHistory()">Save History</button>
                    </div>
                </div>

                <div id="syncContent" class="collapsible-content">
                    <div style="background:#f1f3f4; padding:15px; border-radius:12px;">
                        <button class="btn-secondary" style="width:100%; margin-bottom:5px;" onclick="downloadBackup()">Download JSON</button>
                        <button class="btn-secondary" style="width:100%; margin-bottom:10px;" onclick="document.getElementById('fileInput').click()">Upload JSON</button>
                        <input type="file" id="fileInput" style="display:none" onchange="handleFileUpload(event)">
                        <textarea id="syncArea" style="width:100%; height:50px; font-size:9px; margin-bottom:5px;"></textarea>
                        <div style="display:flex; gap:5px;">
                            <button class="btn-secondary" onclick="exportData()">Copy</button>
                            <button class="btn-secondary" onclick="importData()">Import</button>
                        </div>
                    </div>
                </div>

                <div id="ratesDisplay" style="margin-top: 20px; font-size: 12px; color: var(--gray); text-align: center; border-top: 1px solid #eee; padding-top: 10px;">
                    Exchange Rates (GBP base): Loading...
                </div>
            </div>
        </div>

        <div class="visualization">
            <div id="chartCard" class="chart-card"><canvas id="growthChart"></canvas></div>
            <div id="tableContainer" class="table-container"><table><tbody id="tableBody"></tbody></table></div>
        </div>
    </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
