<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Pro - v9.4 UX Polish</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --danger: #d93025; --gray: #5f6368; --bg: #f0f2f5; --income: #fbbc04; --floor: #ea4335; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 10px; color: #202124; margin: 0; }
        .dashboard-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 1300px; margin: 0 auto; }
        .main-grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; }
        @media (min-width: 800px) {
            body { padding: 30px; }
            .main-grid { grid-template-columns: 360px 1fr; align-items: start; }
            .sidebar { position: sticky; top: 30px; }
            .chart-card, .table-container { display: block !important; }
        }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; margin-bottom: 20px; box-sizing: border-box; }
        .portfolio-header { text-align: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px solid #f0f2f5; }
        .total-amount { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin: 5px 0; }
        .scenario-box { background: #e8f0fe; padding: 15px; border-radius: 12px; border: 2px solid var(--primary); margin-bottom: 15px; }
        .risk-selector { display: flex; gap: 5px; margin-bottom: 15px; background: #f1f3f4; padding: 5px; border-radius: 10px; }
        .risk-btn { flex: 1; border: none; padding: 8px; border-radius: 7px; font-size: 8px; font-weight: bold; cursor: pointer; color: var(--gray); background: transparent; text-transform: uppercase; }
        .risk-btn.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--primary); }
        .rate-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; background: #f8f9fa; padding: 10px; border-radius: 12px; }
        .setup-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; background: #f8f9fa; padding: 15px; border-radius: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 9px; color: var(--gray); text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-calc { background: var(--primary); color: white; width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 16px; border: none; cursor: pointer; margin-bottom: 20px; }
        .btn-secondary { flex: 1; font-size: 11px; background: #f1f3f4; border-radius: 8px; border: none; padding: 10px; cursor: pointer; color: var(--gray); font-weight: bold; }
        .account-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .tag-event { background: #e8f0fe; color: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; margin-top: 4px; display: inline-block; }
        .chart-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: 550px; display: none; box-sizing: border-box; }
        .table-container { background: white; border-radius: 15px; overflow-x: auto; width: 100%; margin-top: 20px; display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 800px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .details-row { display: none; background: #fafafa; }
        .details-container { padding: 15px; border-left: 4px solid var(--primary); font-size: 11px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .collapsible-content { display: none; padding-top: 15px; }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <div class="main-grid">
        <div class="sidebar">
            <div class="card">
                <div class="portfolio-header">
                    <label>Total Assets (Nominal)</label>
                    <div id="totalPortfolioAmount" class="total-amount">£0</div>
                </div>

                <div class="scenario-box">
                    <label style="color: var(--primary);">Master Scenario Retire Age</label>
                    <input type="number" id="scenarioRetireAge" value="65">
                </div>

                <label>Active Return Scenario</label>
                <div class="risk-selector">
                    <button class="risk-btn" id="btn-cons" onclick="applyScenario('cons', this)">Cons</button>
                    <button class="risk-btn active" id="btn-bal" onclick="applyScenario('bal', this)">Bal</button>
                    <button class="risk-btn" id="btn-aggr" onclick="applyScenario('aggr', this)">Aggr</button>
                </div>

                <div class="rate-grid">
                    <div><label>Cons %</label><input type="number" id="rate-cons" value="4"></div>
                    <div><label>Bal %</label><input type="number" id="rate-bal" value="6"></div>
                    <div><label>Aggr %</label><input type="number" id="rate-aggr" value="8"></div>
                </div>

                <div class="setup-grid">
                    <div><label>Birth Year</label><input type="number" id="birthYear" value="1970"></div>
                    <div><label>Inflation %</label><input type="number" id="inflationRate" value="2.5" step="0.1"></div>
                    <div><label>Safe Draw %</label><input type="number" id="drawdownRate" value="4"></div>
                    <div style="background: #fff0f0; padding: 5px; border-radius: 8px; border: 1px solid #fad2cf;">
                        <label style="color: #c5221f;">Adjusted Req /mo</label>
                        <input type="number" id="realRequirement" value="6000" step="1000">
                    </div>
                </div>

                <button class="btn-calc" onclick="calculate()">Project Life Path</button>
                <div id="accountList" style="margin-bottom: 20px;"></div>

                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <button class="btn-secondary" onclick="toggleSection('formContent')">+ Account</button>
                    <button class="btn-secondary" onclick="toggleSection('pensionContent')">+ Pension</button>
                    <button class="btn-secondary" onclick="toggleSection('syncContent')">Backup/Sync</button>
                </div>

                <div id="formContent" class="collapsible-content">
                    <div style="background:#f8f9fa; padding:15px; border-radius:12px;">
                        <input type="hidden" id="editIndex" value="-1">
                        <label>Account Name</label><input type="text" id="accName">
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin: 10px 0;">
                            <div><label>Curr</label><select id="accCurr"><option value="GBP">GBP (£)</option><option value="USD">USD ($)</option><option value="HKD">HKD ($)</option></select></div>
                            <div><label>Balance</label><input type="number" id="accBal"></div>
                        </div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            <div><label>Fixed Draw Age</label><input type="number" id="accRetireAge" value="65"></div>
                            <div><label>Monthly Contrib</label><input type="number" id="accMonthly" value="0"></div>
                        </div>
                        <div style="margin-top: 10px;">
                            <label style="display: flex; align-items: center; gap: 8px; text-transform: none;">
                                <input type="checkbox" id="accLocked" style="width: auto;"> Lock Age (Ignore Master)
                            </label>
                        </div>
                        <div id="eventsListUI" style="margin-top:10px;"></div>
                        <button onclick="addEventInputUI()" style="font-size:10px; background:none; border:1px solid #ccc; padding:5px; border-radius:5px;">+ Add One-Off Event</button>
                        <button class="btn-calc" style="background:var(--success); margin-top:20px;" onclick="saveAccount()">Save Account</button>
                        <button class="btn-secondary" style="width:100%; color:var(--danger); margin-top:5px;" onclick="confirmRemove()">Remove Account</button>
                    </div>
                </div>
                <div id="pensionContent" class="collapsible-content">
                    <div style="background:#e6f4ea; padding:15px; border-radius:12px;">
                        <label>Pensions / External Income</label>
                        <div id="pensionInputList"></div>
                        <button onclick="addPensionUI()" style="font-size:10px; background:white; border:1px solid #34a853; padding:5px; border-radius:5px; color:#34a853; margin-top:10px;">+ Add Stream</button>
                        <button class="btn-calc" style="background:var(--success); margin-top:10px;" onclick="savePensions()">Save Pensions</button>
                    </div>
                </div>
                <div id="syncContent" class="collapsible-content">
                    <div style="background:#f1f3f4; padding:15px; border-radius:12px;">
                        <button class="btn-secondary" style="width:100%; margin-bottom:5px;" onclick="downloadBackup()">Download .JSON</button>
                        <button class="btn-secondary" style="width:100%; margin-bottom:10px;" onclick="document.getElementById('fileInput').click()">Upload .JSON</button>
                        <input type="file" id="fileInput" style="display:none" onchange="handleFileUpload(event)">
                        <textarea id="syncArea" style="width:100%; height:60px; font-size:9px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px;" placeholder="Base64 String"></textarea>
                        <div style="display:flex; gap:10px;">
                            <button class="btn-secondary" onclick="exportData()">Copy</button>
                            <button class="btn-secondary" onclick="importData()">Import</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="visualization">
            <div id="chartCard" class="chart-card"><canvas id="growthChart"></canvas></div>
            <div id="tableContainer" class="table-container"><table><tbody id="tableBody"></tbody></table></div>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'GlobalPortfolio_V6';
    const PENSION_KEY = 'GlobalPortfolio_PENSIONS_V6';
    const rates = { "GBP": 1.0, "USD": 1.27, "HKD": 9.92 };
    let accounts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let pensions = JSON.parse(localStorage.getItem(PENSION_KEY)) || [];
    let activeScenarioType = 'bal';
    let myChart;

    updateList(); updateTotalHeader();
    pensions.forEach(p => addPensionUI(p.name, p.amount, p.age, p.currency));

    function applyScenario(type, btn) {
        activeScenarioType = type;
        document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        calculate();
    }

    function calculate() {
        const currentYear = new Date().getFullYear();
        const birthYear = parseInt(document.getElementById('birthYear').value);
        const startAge = currentYear - birthYear;
        const inflation = parseFloat(document.getElementById('inflationRate').value) / 100;
        const drawRate = parseFloat(document.getElementById('drawdownRate').value) / 100;
        const realReqAnnual = parseFloat(document.getElementById('realRequirement').value) * 12;
        const scenarioAge = parseInt(document.getElementById('scenarioRetireAge').value);
        const activeRate = (parseFloat(document.getElementById('rate-' + activeScenarioType).value) || 6) / 100;

        let tempAccs = JSON.parse(JSON.stringify(accounts));
        let labels = [], nomPotData = [], realPotData = [], nomIncData = [], realIncData = [], floorData = [];
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = `<tr style="background:#f8f9fa;"><th>Year (Age)</th><th>Breakout (Net £)</th><th>Nominal Pot</th><th>Adjusted Pot</th></tr>`;

        for (let y = 0; y <= (95 - startAge); y++) {
            let year = currentYear + y, age = startAge + y;
            let n_Dist = 0, n_Pens = 0, totalBalNom = 0;
            let incomeBreakdown = [], contribBreakdown = [], eventTags = [], balNomDetails = [];

            pensions.forEach(p => {
                if (age >= p.age) {
                    let gbpPenNom = (p.amount / rates[p.currency]) * Math.pow(1 + inflation, y);
                    n_Pens += gbpPenNom;
                    incomeBreakdown.push({ n: p.name, v: gbpPenNom });
                }
            });

            tempAccs.forEach(a => {
                const effectiveAge = a.locked ? a.retireAge : scenarioAge;
                let isRet = age >= effectiveAge;
                let mon = isRet ? 0 : a.monthly;

                if (a.events) {
                    a.events.forEach(ev => {
                        if (parseInt(ev.age) === age) {
                            let nominalEventValue = parseFloat(ev.amount) * Math.pow(1 + inflation, y);
                            a.balance += nominalEventValue;
                            eventTags.push(`<span class="tag-event">${ev.name}: £${Math.round(nominalEventValue/rates[a.currency]).toLocaleString()}</span>`);
                        }
                    });
                }

                for (let m = 0; m < 12; m++) a.balance = (a.balance + mon) * (1 + (activeRate / 12));
                if (isRet) {
                    let dist = a.balance * drawRate;
                    a.balance -= dist;
                    n_Dist += (dist / rates[a.currency]);
                    incomeBreakdown.push({ n: a.name + ' Dist', v: (dist / rates[a.currency]) });
                }
                if(!isRet && a.monthly > 0) contribBreakdown.push({ n: a.name, v: a.monthly * 12 });
                balNomDetails.push({ n: a.name, v: a.balance / rates[a.currency] });
                totalBalNom += a.balance / rates[a.currency];
            });

            let realValGBP = totalBalNom / Math.pow(1 + inflation, y);
            let aggregateNom = (n_Pens + n_Dist);
            let aggregateReal = aggregateNom / Math.pow(1 + inflation, y);

            labels.push(year);
            nomPotData.push(Math.round(totalBalNom));
            realPotData.push(Math.round(realValGBP));
            nomIncData.push(Math.round(aggregateNom));
            realIncData.push(Math.round(aggregateReal));
            floorData.push(Math.round(realReqAnnual));

            const rid = `row-${y}`;
            const isMilestone = (age === scenarioAge);
            
            tableBody.innerHTML += `
                <tr class="main-row" onclick="toggleRow('${rid}')" style="${isMilestone ? 'background:#e8f0fe; border-left: 5px solid var(--primary);' : ''}">
                    <td><b>${year}</b> (${age}) ${isMilestone ? '🎯' : '▾'}</td>
                    <td>
                        <div class="cf-total" style="color:${aggregateReal >= realReqAnnual ? 'var(--success)' : 'var(--danger)'}">
                            Net: £${Math.round(aggregateNom).toLocaleString()} (£${Math.round(aggregateReal).toLocaleString()} adjusted)
                        </div>
                        ${eventTags.join(' ')}
                    </td>
                    <td>£${Math.round(totalBalNom).toLocaleString()}</td>
                    <td>£${Math.round(realValGBP).toLocaleString()}</td>
                </tr>
                <tr id="${rid}" class="details-row" style="display:none;"><td colspan="4">
                    <div class="details-container">
                        <div><b>Nominal Bals:</b><br>${balNomDetails.map(d=>d.n+': £'+Math.round(d.v).toLocaleString()).join('<br>')}</div>
                        <div>
                            <b>Income:</b><br>${incomeBreakdown.map(i=>i.n+': £'+Math.round(i.v).toLocaleString()).join('<br>') || 'None'}
                            <hr style="margin:5px 0;">
                            <b>Activity:</b><br>${contribBreakdown.map(c=>c.n+' Contrib: £'+Math.round(c.v).toLocaleString()).join('<br>') || 'None'}
                        </div>
                    </div>
                </td></tr>`;
        }
        document.getElementById('chartCard').style.display = 'block';
        renderGrowthChart(labels, nomPotData, realPotData, nomIncData, realIncData, floorData);
        updateTotalHeader();
    }

    function renderGrowthChart(l, np, rp, ni, ri, fd) {
        const ctx = document.getElementById('growthChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: l,
                datasets: [
                    { label: 'Nominal Pot', data: np, borderColor: '#1a73e8', pointRadius: 0, tension: 0.2, yAxisID: 'y' },
                    { label: 'Adjusted Pot', data: rp, borderColor: '#34a853', pointRadius: 0, tension: 0.2, yAxisID: 'y' },
                    { label: 'Nominal Income', data: ni, borderColor: '#fbbc04', borderDash: [5, 5], pointRadius: 0, tension: 0.2, yAxisID: 'y1' },
                    { label: 'Adjusted Income', data: ri, borderColor: '#e67c73', borderDash: [5, 5], pointRadius: 0, tension: 0.2, yAxisID: 'y1' },
                    { label: 'Target Floor', data: fd, borderColor: '#ea4335', borderWidth: 2, pointRadius: 0, tension: 0, yAxisID: 'y1' }
                ]
            },
            options: { 
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    y: { position: 'left', ticks: { callback: v => '£' + (v / 1000).toFixed(0) + 'k' } }, 
                    y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { callback: v => '£' + (v / 1000).toFixed(0) + 'k' } } 
                } 
            }
        });
    }

    function addEventInputUI(name = '', amount = '', age = '') {
        const div = document.createElement('div');
        div.style = "display:grid; grid-template-columns: 1fr 70px 50px 30px; gap:5px; margin-bottom:5px;";
        div.innerHTML = `<input type="text" placeholder="Note" value="${name}" class="ev-n"><input type="number" placeholder="Amt" value="${amount}" class="ev-a"><input type="number" placeholder="Age" value="${age}" class="ev-y"><button onclick="this.parentElement.remove()" style="color:red; background:none; border:none;">✕</button>`;
        document.getElementById('eventsListUI').appendChild(div);
    }
    function saveAccount() {
        const events = []; document.querySelectorAll('#eventsListUI > div').forEach(row => {
            const n = row.querySelector('.ev-n').value; const a = row.querySelector('.ev-a').value; const y = row.querySelector('.ev-y').value;
            if (n && a && y) events.push({ name: n, amount: parseFloat(a), age: parseInt(y) });
        });
        const data = {
            name: document.getElementById('accName').value, currency: document.getElementById('accCurr').value,
            balance: parseFloat(document.getElementById('accBal').value) || 0,
            monthly: parseFloat(document.getElementById('accMonthly').value) || 0,
            retireAge: parseInt(document.getElementById('accRetireAge').value) || 65,
            locked: document.getElementById('accLocked').checked, events: events
        };
        const idx = parseInt(document.getElementById('editIndex').value);
        if(idx > -1) accounts[idx] = data; else accounts.push(data);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));
        updateList(); toggleSection('formContent'); calculate();
    }
    function updateList() {
        const list = document.getElementById('accountList');
        list.innerHTML = accounts.map((a, i) => `<div class="account-item"><div><b>${a.name}</b><br><small>${a.currency} · Draw: ${a.retireAge} ${a.locked ? '🔒' : '🔗'}</small></div><button class="btn-secondary" style="padding:4px 8px; font-size:9px;" onclick="editAccount(${i})">Edit</button></div>`).join('');
    }
    function editAccount(i) {
        const a = accounts[i];
        document.getElementById('accName').value = a.name; document.getElementById('accCurr').value = a.currency;
        document.getElementById('accBal').value = a.balance; document.getElementById('accRetireAge').value = a.retireAge;
        document.getElementById('accMonthly').value = a.monthly; document.getElementById('accLocked').checked = a.locked;
        document.getElementById('editIndex').value = i; document.getElementById('eventsListUI').innerHTML = '';
        if (a.events) a.events.forEach(ev => addEventInputUI(ev.name, ev.amount, ev.age));
        toggleSection('formContent');
    }
    function addPensionUI(name = '', amount = '', age = '', currency = 'GBP') {
        const div = document.createElement('div');
        div.style = "display:grid; grid-template-columns: 1fr 60px 80px 60px 30px; gap: 5px; margin-bottom: 8px;";
        div.innerHTML = `<input type="text" placeholder="Name" value="${name}" class="pen-name"><select class="pen-curr"><option value="GBP" ${currency==='GBP'?'selected':''}>GBP</option><option value="USD" ${currency==='USD'?'selected':''}>USD</option><option value="HKD" ${currency==='HKD'?'selected':''}>HKD</option></select><input type="number" placeholder="Amt" value="${amount}" class="pen-amt"><input type="number" placeholder="Age" value="${age}" class="pen-age"><button onclick="this.parentElement.remove()" style="color:red; background:none; border:none;">✕</button>`;
        document.getElementById('pensionInputList').appendChild(div);
    }
    function savePensions() {
        pensions = []; document.querySelectorAll('#pensionInputList > div').forEach(row => {
            const name = row.querySelector('.pen-name').value; const amount = row.querySelector('.pen-amt').value;
            const age = row.querySelector('.pen-age').value; const currency = row.querySelector('.pen-curr').value;
            if (name && amount && age) pensions.push({ name, amount: parseFloat(amount), age: parseInt(age), currency });
        }); localStorage.setItem(PENSION_KEY, JSON.stringify(pensions)); toggleSection('pensionContent'); calculate();
    }
    function downloadBackup() { const blob = new Blob([JSON.stringify({accounts, pensions})], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `portfolio.json`; a.click(); }
    function exportData() { document.getElementById('syncArea').value = btoa(JSON.stringify({acc: accounts, pen: pensions})); alert("Copied!"); }
    function importData() { try { const d = JSON.parse(atob(document.getElementById('syncArea').value)); accounts = d.acc; pensions = d.pen; localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts)); localStorage.setItem(PENSION_KEY, JSON.stringify(pensions)); location.reload(); } catch(e) { alert("Invalid"); } }
    function toggleSection(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
    function toggleRow(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'table-row') ? 'none' : 'table-row'; }
    function updateTotalHeader() { let t = 0; accounts.forEach(a => t += (a.balance / rates[a.currency])); document.getElementById('totalPortfolioAmount').innerText = "£" + Math.round(t).toLocaleString(); }
    function confirmRemove() { const idx = parseInt(document.getElementById('editIndex').value); if(idx > -1 && confirm("Remove?")) { accounts.splice(idx,1); localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts)); updateList(); toggleSection('formContent'); calculate(); } }
</script>
</body>
</html>
